# Prometheus scrape job for Pushgateway (example static config snippet)
# Add to your Prometheus `scrape_configs` or include via file_sd/consul/kubernetes service discovery.

scrape_configs:
  - job_name: 'pushgateway'
    honor_labels: true
    static_configs:
      - targets: ['pushgateway.monitoring.svc:9091']

# If using Kubernetes service discovery, you can target the Pushgateway service directly:
